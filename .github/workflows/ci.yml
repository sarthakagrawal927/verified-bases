name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        run: npm ci

      - name: type-check
        run: npm run check

      - name: build
        run: npm run build
        env:
          PUBLIC_SITE_ORIGIN: https://bases.sarthakagrawal.dev

      - name: upload-dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  api:
    name: api (Go on Workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # The Worker target is wasm/js — vet + build must run against it,
      # otherwise syscall/js fails to link.
      GOOS: js
      GOARCH: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: api/go.sum

      - name: vet
        run: go vet ./...

      - name: build-wasm
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o build/app.wasm .
          ls -lh build/app.wasm
          gzip -kc build/app.wasm > /tmp/app.wasm.gz
          ls -lh /tmp/app.wasm.gz

      - name: upload-wasm
        uses: actions/upload-artifact@v4
        with:
          name: api-wasm
          path: api/build/app.wasm
          retention-days: 7
