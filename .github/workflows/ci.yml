name: ci

on:
  push:
    branches: [main]
  pull_request:

# Reduce wasted reruns on rapid pushes — only the latest commit on a branch matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        run: npm ci

      - name: type-check
        run: npm run check

      - name: build
        run: npm run build
        env:
          # OG/favicon raster step needs sharp; build also generates per-route
          # pages including [slug] paths.
          PUBLIC_SITE_ORIGIN: https://bases.sarthakagrawal.dev

      - name: upload-dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  api:
    name: api (Go + TinyGo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: api/go.sum

      - name: vet
        run: go vet ./...

      - name: install-tinygo
        run: |
          wget -q https://github.com/tinygo-org/tinygo/releases/download/v0.34.0/tinygo_0.34.0_amd64.deb
          sudo dpkg -i tinygo_0.34.0_amd64.deb
          tinygo version

      - name: build-wasm
        run: |
          mkdir -p build
          tinygo build -o build/app.wasm -target wasm -no-debug ./...
          ls -lh build/app.wasm

      - name: upload-wasm
        uses: actions/upload-artifact@v4
        with:
          name: api-wasm
          path: api/build/app.wasm
          retention-days: 7
