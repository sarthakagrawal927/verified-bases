name: Deploy API Worker

# Deploys the verified-bases-api Cloudflare Worker (Go -> WASM via syumai/workers).
# The web surface (verified-bases-web Pages project) is git-connected natively in
# the Cloudflare dashboard and is intentionally NOT handled here.
#
# Dispatch-only for now; a push trigger (paths: api/**) can be added once a few
# manual runs confirm the build + deploy path is green in CI.

on:
  workflow_dispatch:
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: deploy (Go on Workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      # Go + Node are the build/deploy prerequisites. Do NOT set job-level
      # GOOS/GOARCH: `make build` runs workers-assets-gen on the host first
      # (native go), then scopes GOOS=js GOARCH=wasm to the `go build` line.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: api/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Early, named build check: make build => workers-assets-gen (emits
      # build/worker.mjs runtime) + GOOS=js GOARCH=wasm go build (emits
      # build/app.wasm). Surfaces build breakage before any Cloudflare call.
      - name: build
        run: make build

      # Deploy via wrangler directly (matches `make deploy`). wrangler reads
      # api/wrangler.jsonc and re-runs build.command (`make build`) here, which
      # is why go + make must be on PATH in THIS step — workers-assets-gen wipes
      # build/ first, so the deployed worker.mjs comes from this re-run, not the
      # step above. `--yes` auto-confirms the npx install prompt (the prior
      # wrangler-action run failed because that prompt could not be answered).
      - name: deploy
        run: npx --yes wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
